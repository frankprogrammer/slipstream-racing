<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Slipstream: Grand Prix</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;500;600;700;800&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      /* Colors: --f1-* set at runtime from CONFIG.PALETTE in main.ts */
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--f1-bg-app, #15151e);
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        touch-action: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Speed readout: KM/H + raw scrollPerFrame (no conversion) */
      #speed-hud {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: "Exo 2", system-ui, sans-serif;
        background: rgba(0, 0, 0, 0.18);
        padding: 8px 12px;
        border-radius: 9999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        pointer-events: none;
        z-index: 12;
        opacity: 0;
        transition: opacity 120ms linear;
        user-select: none;
        box-sizing: border-box;
        width: min(calc(100vw - 16px), 420px);
        max-width: calc(100vw - 16px);
      }
      #speed-text-wrap {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #speed-text {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: 0.16em;
        color: var(--f1-ui-text, #f8fafc);
        text-shadow: 0 0 12px var(--f1-milestone-glow, rgba(225, 6, 0, 0.55));
        white-space: nowrap;
        display: inline-block;
        transform-origin: center center;
        will-change: transform;
      }

      #milestone-text {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -100%);
        font-family: "Bebas Neue", sans-serif;
        text-align: center;
        font-size: 42px;
        font-weight: 400;
        color: var(--f1-primary, #e10600);
        text-shadow:
          0 0 32px var(--f1-milestone-glow, rgba(225, 6, 0, 0.55)),
          0 0 64px var(--f1-milestone-cyan, rgba(0, 210, 190, 0.2));
        opacity: 0;
        letter-spacing: 0.12em;
        pointer-events: none;
        z-index: 12;
        transition: opacity 0.35s ease-out;
      }
      #milestone-text.perfect {
        font-size: clamp(48px, 12vw, 72px);
        letter-spacing: 0.22em;
        text-shadow:
          0 0 40px var(--f1-perfect-glow-1, rgba(225, 6, 0, 0.9)),
          0 0 80px var(--f1-perfect-glow-2, rgba(225, 6, 0, 0.45)),
          0 0 120px var(--f1-perfect-cyan, rgba(0, 210, 190, 0.25));
        animation: perfect-pop 0.5s cubic-bezier(0.34, 1.45, 0.64, 1) both;
      }
      @keyframes perfect-pop {
        0% {
          transform: translate(-50%, -100%) scale(0.5);
          filter: blur(4px);
          opacity: 0;
        }
        55% {
          transform: translate(-50%, -100%) scale(1.08);
          filter: blur(0);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -100%) scale(1);
          opacity: 1;
        }
      }

      /* Screen Flash */
      #screen-flash {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--f1-flash-tint, rgba(225, 6, 0, 0.22));
        opacity: 0;
        pointer-events: none;
        z-index: 5;
        transition:
          opacity 0.12s ease-out,
          background 0.2s ease;
      }
      #screen-flash.perfect-hit {
        background: var(--f1-flash-perfect, rgba(225, 6, 0, 0.4));
        box-shadow: inset 0 0 120px
          var(--f1-perfect-inset, rgba(0, 210, 190, 0.1));
      }

      /* Game Over Overlay */
      #gameover {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--f1-gameover-scrim, rgba(21, 21, 30, 0.92));
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: min(36px, 4.5vw);
        z-index: 20;
        font-family: "Exo 2", sans-serif;
        color: var(--f1-ui-text, #f8fafc);
      }
      #gameover.visible {
        display: flex;
      }
      #gameover h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 34px;
        letter-spacing: 0.28em;
        color: var(--f1-primary, #e10600);
        margin: 0 0 30px 0;
        font-weight: 400;
      }
      #final-score {
        font-family: "Bebas Neue", sans-serif;
        font-size: 76px;
        font-weight: 400;
        line-height: 1.05;
        margin: 0 0 12px 0;
        letter-spacing: 0.06em;
      }
      #new-best {
        font-size: 20px;
        font-weight: 600;
        color: var(--f1-cyan, #00d2be);
        margin: 0 0 36px 0;
        display: none;
        letter-spacing: 0.08em;
      }
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 48px;
        margin: 0 0 48px 0;
        font-size: 18px;
        font-weight: 500;
        color: var(--f1-ui-dim, #9ca3af);
        letter-spacing: 0.12em;
      }
      .stat-row span strong {
        color: var(--f1-ui-text, #f8fafc);
        font-weight: 700;
      }
      #retry-btn {
        font-family: "Exo 2", sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: var(--f1-ui-text, #f8fafc);
        background: transparent;
        border: 3px solid var(--f1-primary, #e10600);
        border-radius: 8px;
        padding: 22px 64px;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s;
        pointer-events: auto;
        text-transform: uppercase;
      }
      #retry-btn:hover,
      #retry-btn:active {
        background: var(--f1-retry-hover, rgba(225, 6, 0, 0.12));
        box-shadow: 0 0 40px var(--f1-retry-glow, rgba(225, 6, 0, 0.35));
      }

      /* Audio controls */
      #audio-controls {
        position: absolute;
        bottom: 16px;
        right: 16px;
        z-index: 30;
        display: flex;
        gap: 8px;
      }
      .audio-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.35);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .audio-btn:hover {
        background: rgba(0, 0, 0, 0.55);
        border-color: rgba(255, 255, 255, 0.35);
      }
      .audio-btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: rgba(255, 255, 255, 0.8);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .audio-btn.muted {
        border-color: rgba(225, 6, 0, 0.5);
      }
      .audio-btn.muted svg {
        stroke: rgba(255, 255, 255, 0.4);
      }

      /* F1 Starting Lights */
      #start-lights {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 15;
        display: none;
        gap: 18px;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      #start-lights.visible {
        display: flex;
      }
      .start-light {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: rgba(60, 60, 60, 0.7);
        border: 3px solid rgba(255, 255, 255, 0.15);
        transition: background 0.12s, box-shadow 0.12s, border-color 0.12s;
      }
      .start-light.red {
        background: #e10600;
        border-color: rgba(225, 6, 0, 0.6);
        box-shadow: 0 0 24px rgba(225, 6, 0, 0.7), 0 0 48px rgba(225, 6, 0, 0.3);
      }
      .start-light.green {
        background: #00d2be;
        border-color: rgba(0, 210, 190, 0.6);
        box-shadow: 0 0 24px rgba(0, 210, 190, 0.7), 0 0 48px rgba(0, 210, 190, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <!-- Three.js canvas injected here -->

      <div id="speed-hud">
        <div id="speed-text-wrap">
          <span id="speed-text"></span>
        </div>
      </div>
      <div id="milestone-text"></div>
      <div id="screen-flash"></div>

      <div id="start-lights">
        <div class="start-light" id="light-0"></div>
        <div class="start-light" id="light-1"></div>
        <div class="start-light" id="light-2"></div>
      </div>

      <div id="audio-controls">
        <!-- Music toggle -->
        <button id="music-toggle" class="audio-btn" aria-label="Toggle music">
          <svg id="music-icon-on" viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <svg id="music-icon-off" viewBox="0 0 24 24" style="display:none">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke-width="2.5"/>
          </svg>
        </button>
        <!-- All sound toggle -->
        <button id="sound-toggle" class="audio-btn" aria-label="Toggle all sound">
          <svg id="sound-icon-on" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <svg id="sound-icon-off" viewBox="0 0 24 24" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
      </div>

      <!-- Game Over -->
      <div id="gameover">
        <h2>GAME OVER</h2>
        <div id="final-score">0</div>
        <div id="new-best">⚡ NEW BEST</div>
        <div class="stat-row">
          <span>CHAIN <strong id="stat-chain">×0</strong></span>
          <span>DIST <strong id="stat-distance">0m</strong></span>
        </div>
        <button id="retry-btn">RETRY</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
