# GitHub Pages: main → https://<user>.github.io/<repo>/
# Any other branch → https://<user>.github.io/<repo>/<branch>/ without removing the root site or other branches.
#
# Requires: Repo → Settings → Pages → Build and deployment → Source: **Deploy from a branch**
# Branch: **gh-pages** / **/** (root). (Not "GitHub Actions" — this workflow pushes the gh-pages branch.)
name: Deploy static content to Pages

on:
  push:
    branches:
      - main
      - '**'
    branches-ignore:
      - gh-pages

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages (site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

  deploy-branch:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Compute branch slug
        run: |
          slug="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr -c 'a-z0-9._-' '-')"
          echo "BRANCH_SLUG=${slug}" >> "$GITHUB_ENV"

      - name: Install and build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/${{ env.BRANCH_SLUG }}/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages (subfolder named like branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ env.BRANCH_SLUG }}
          keep_files: true
