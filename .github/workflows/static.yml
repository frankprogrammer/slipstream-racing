# GitHub Pages: main → https://<user>.github.io/<repo>/
# Tags matching v* → https://<user>.github.io/<repo>/<tag>/ (e.g. v1) without removing the root site or other tags.
#
# Requires: Repo → Settings → Pages → Build and deployment → Source: **Deploy from a branch**
# Branch: **gh-pages** / **/** (root). (Not "GitHub Actions" — this workflow pushes the gh-pages branch.)
name: Deploy static content to Pages

on:
  push:
    branches: [main]
    tags: ['v*']

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages (site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

  deploy-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/${{ github.ref_name }}/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages (subfolder named like the tag)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ github.ref_name }}
          keep_files: true
